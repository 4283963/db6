<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>局域网文件快传</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">
        <span class="logo-icon">📡</span>
        <h1>局域网文件快传</h1>
      </div>
      <div class="server-info">
        <span id="serverStatus" class="status-dot"></span>
        <span id="serverAddr">等待启动...</span>
      </div>
    </header>

    <section class="send-section">
      <div class="target-input-row">
        <label for="targetIP">目标设备 IP：</label>
        <input
          type="text"
          id="targetIP"
          placeholder="例如：192.168.1.100"
          autocomplete="off"
        />
      </div>

      <div
        id="dropZone"
        class="drop-zone"
        tabindex="0"
        role="button"
        aria-label="拖拽文件到此处上传，或点击选择文件"
      >
        <div class="drop-content">
          <div class="drop-icon">📁</div>
          <div class="drop-title">拖拽文件到此处</div>
          <div class="drop-subtitle">或 <span class="link">点击选择文件</span></div>
        </div>
        <input type="file" id="fileInput" multiple hidden />
      </div>
    </section>

    <section class="transfer-section">
      <div class="section-header">
        <h2>传输列表</h2>
        <span id="taskCount" class="task-count">0 项</span>
      </div>
      <div id="taskList" class="task-list">
        <div id="emptyState" class="empty-state">
          暂无传输任务
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>接收文件保存位置：</span>
      <code id="downloadDir">—</code>
    </footer>
  </div>

  <div id="progressModal" class="progress-modal" aria-hidden="true">
    <div class="progress-modal-overlay"></div>
    <div class="progress-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="pmTitle">
      <div class="progress-modal-header">
        <div class="pm-icon" id="pmIcon">📤</div>
        <div class="pm-title" id="pmTitle">正在发送文件</div>
      </div>
      <div class="progress-modal-body">
        <div class="pm-file-name" id="pmFileName">—</div>
        <div class="pm-progress-wrap">
          <div class="pm-progress-bar" id="pmProgressBar" style="width: 0%"></div>
        </div>
        <div class="pm-progress-meta">
          <span class="pm-percent" id="pmPercent">0%</span>
          <span class="pm-size" id="pmSize">0 B / 0 B</span>
        </div>
      </div>
      <div class="progress-modal-footer" id="pmFooter">
        <div class="pm-message" id="pmMessage">传输中...</div>
        <button id="pmCloseBtn" class="pm-close-btn" hidden>知道了</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
